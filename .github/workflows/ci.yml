# =================================================================
# CI Pipeline for URL Shortener
# =================================================================
# Runs on every push and pull request to main branch.
# Three jobs: lint, test, build — lint and test run in parallel,
# build runs only after both pass.
#
# Why trigger on both push AND pull_request?
#   - push: catches issues on direct pushes to main
#   - pull_request: catches issues BEFORE code is merged
#   In practice, you'd protect the main branch and only allow
#   merges through PRs. But having both triggers is a safety net.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs when a new commit is pushed to the same branch.
# Without this, pushing 3 commits quickly starts 3 CI runs.
# Only the latest matters — cancel the older ones to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions for security.
# By default, GITHUB_TOKEN has broad permissions.
# We restrict to only what's needed.
permissions:
  contents: read
  packages: write  # Needed for pushing Docker images to ghcr.io

jobs:
  # =============================================================
  # Job 1: Lint
  # =============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code.
      # actions/checkout is the most-used action — it clones your repo
      # into the runner's workspace so subsequent steps can access it.
      - name: Checkout code
        uses: actions/checkout@v5

      # Step 2: Install Go.
      # actions/setup-go installs the specified Go version and configures
      # caching for the Go module and build cache automatically.
      #
      # The Go version should match what's in go.mod.
      # Using go.mod as the source of truth avoids version drift
      # between local dev and CI.
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Step 3: Run golangci-lint.
      # This official action handles installation and caching of
      # golangci-lint binary and analysis cache.
      #
      # Why use the action instead of `go install` + `run`?
      #   - The action caches the lint binary AND lint results
      #   - First run: ~2 min. Subsequent (if only few files changed): ~20s
      #   - Handles version pinning cleanly
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  # =============================================================
  # Job 2: Test
  # =============================================================
  test:
    name: Test
    runs-on: ubuntu-latest

    # Service containers: GitHub Actions can spin up Docker containers
    # alongside your job. They're accessible via localhost because
    # the job runs directly on the host (not in a container).
    #
    # These are ephemeral — created fresh for each CI run, destroyed after.
    # Perfect for integration tests: real DB, real Redis, clean state.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: url_shortener
        ports:
          - 5432:5432
        # Health check: GitHub Actions waits for this to pass before
        # starting job steps. Without it, the test step might run
        # before Postgres is ready to accept connections → flaky tests.
        options: >-
          --health-cmd="pg_isready -U root -d url_shortener"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Install golang-migrate CLI to run database migrations.
      # Tests need the schema to exist before they can query.
      #
      # We install from the official GitHub release — pre-compiled binary,
      # no need to build from source.
      - name: Install migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.3/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate
          migrate --version

      # Run migrations against the CI Postgres instance.
      # This creates all tables (users, urls, click_events, url_stats_daily)
      # so integration tests have a schema to work with.
      - name: Run migrations
        run: migrate -path migrations -database "$DATABASE_URL" -verbose up
        env:
          DATABASE_URL: postgres://root:secret@localhost:5432/url_shortener?sslmode=disable

      # Run all tests with:
      #   -race: enable race detector (catches concurrent data access bugs).
      #          This is CRITICAL for your project because you use goroutines
      #          heavily (analytics workers, channel operations).
      #          Race detector adds ~2-10x slowdown but catches bugs that
      #          are nearly impossible to find by code review.
      #   -coverprofile: generate coverage report.
      #   -count=1: disable test caching (ensure tests actually run in CI).
      #   -timeout=5m: safety net for hanging tests.
      - name: Run tests
        run: go test -race -coverprofile=coverage.out -count=1 -timeout=5m ./...
        env:
          DATABASE_URL: postgres://root:secret@localhost:5432/url_shortener?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          SERVER_PORT: "8080"
          BASE_URL: http://localhost:8080
          JWT_SECRET: ci-test-secret-key-at-least-32-bytes-long!!
          JWT_EXPIRY: 24h

      # Upload coverage report as a build artifact.
      # You can download it from the Actions tab to inspect locally.
      # Later, you can integrate with Codecov or Coveralls for
      # coverage badges and PR comments.
      - name: Upload coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # =============================================================
  # Job 3: Build Docker Image
  # =============================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    # Only run after lint and test pass.
    # If either fails, this job is skipped entirely.
    needs: [ lint, test ]

    # Only build and push images for pushes to main (not for PRs).
    # PRs should verify the image builds, but not push to registry —
    # we don't want every PR branch polluting our image registry.
    #
    # For PRs, we still build (to verify it compiles) but don't push.
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Docker Buildx is an extended build tool that supports
      # multi-platform builds, better caching, and BuildKit features.
      # It's the modern way to build Docker images.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Authenticate to GitHub Container Registry (ghcr.io).
      # GITHUB_TOKEN is automatically provided by GitHub Actions —
      # no need to create or manage secrets manually.
      #
      # Only login on push to main (not on PRs from forks,
      # which don't have access to GITHUB_TOKEN).
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags.
      # We tag with both the commit SHA (immutable, for rollbacks)
      # and "latest" (convenient, for dev environments).
      #
      # In production, you'd also tag with semver (v1.2.3).
      # SHA tags are crucial because "latest" is mutable —
      # if something breaks, you can deploy the previous SHA
      # without ambiguity about what "latest" meant yesterday.
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Build the image. Push only on main branch pushes.
      # For PRs, this step builds but doesn't push (validates
      # that the Dockerfile works without polluting the registry).
      #
      # cache-from/cache-to: GitHub Actions cache for Docker layers.
      # First build: ~2 min (download base images, install deps).
      # Subsequent: ~30s (only rebuild changed layers).
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
