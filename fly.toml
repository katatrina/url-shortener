# fly.toml app configuration file generated for linkly-api-broken-night-5942 on 2026-04-09T08:31:09+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'linkly-api-broken-night-5942'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  SERVER_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/readyz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
