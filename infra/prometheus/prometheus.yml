# Global config applies to all scrape jobs unless overridden.
global:
  # How often Prometheus scrapes targets.
  # 15s is the default and a good balance between freshness and load.
  #
  # Lower (5s): more granular data, but more storage and more load on targets.
  # Higher (60s): less storage, but you might miss short-lived spikes.
  #
  # For a URL shortener in dev, 15s is fine. In production with high traffic,
  # you might go to 10s for the app and 30s for infrastructure metrics.
  scrape_interval: 15s

  # How long to wait for a scrape response before giving up.
  # If your /metrics endpoint takes longer than this, Prometheus marks
  # the target as "down". 10s is generous — /metrics should respond in < 100ms.
  scrape_timeout: 10s

# Scrape configurations — each "job" tells Prometheus what to scrape and how.
scrape_configs:
  # Job 1: Our URL shortener Go app.
  - job_name: "url-shortener"

    # Override global interval for this specific job if needed.
    # scrape_interval: 10s

    static_configs:
      - targets: ["app:8080"]
        # Labels are attached to every metric scraped from this target.
        # Useful when you have multiple environments (dev, staging, prod)
        # or multiple instances of the same service.
        labels:
          environment: "development"

    # By default, Prometheus scrapes /metrics. If your endpoint is different,
    # uncomment and change this:
    # metrics_path: "/metrics"

  # Job 2: Prometheus scraping itself.
  # Yes, Prometheus exposes its own metrics! This lets you monitor
  # Prometheus's health: memory usage, scrape duration, storage size, etc.
  # "Who watches the watchmen?" — Prometheus watches itself.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]